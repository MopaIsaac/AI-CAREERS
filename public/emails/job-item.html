<div class="job {{featuredClass}}">
  {{featuredBadge}}
  <h3>{{title}}</h3>
  <div class="meta">
    <span>{{type}}</span>
    {{salaryHtml}}
    <span>{{location}}</span>
  </div>
  <p style="font-size:14px;color:#475569;margin:8px 0 0">{{description}}...</p>
  <div style="margin-top: 12px;">
    <a href="{{jobUrl}}" style="color: #0070c4; text-decoration: none; font-size: 14px; font-weight: 600;">View Details →</a>
  </div>
</div>
